# Server
server.port=8080

# Database (MariaDB 11.2 via Docker - mariadb-dev container)
spring.datasource.url=jdbc:mysql://localhost:3306/edusage_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=edusage_user
spring.datasource.password=EdusageFX@2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=edusage_jwt_secret_key_must_be_at_least_32_chars_long_here
jwt.expiration=86400000

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
app.upload.dir=./uploads
